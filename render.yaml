services:
  - type: web
    name: knowexper
    runtime: docker
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    maxShutdownDelaySeconds: 120
    disk:
      name: knowexper-data
      mountPath: /app/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: DOCUMENT_STORE_DIR
        value: /app/data/documents
      - key: HIGHLAND_BASE_URL
        sync: false
      - key: HIGHLAND_API_KEY
        sync: false
      - key: HIGHLAND_MODEL
        sync: false
      - key: BETA_ACCESS_CODE
        sync: false
      - key: MAX_UPLOAD_MB
        value: 15
      - key: MAX_PAGES
        value: 30
      - key: PDF_RENDER_SCALE
        value: 1.8
      - key: RATE_LIMIT_WINDOW_MIN
        value: 15
      - key: PROCESS_RATE_LIMIT
        value: 3
      - key: REGENERATE_RATE_LIMIT
        value: 10
      - key: ASK_RATE_LIMIT
        value: 30
      - key: MAX_CONCURRENT_JOBS
        value: 1
      - key: AI_REQUEST_TIMEOUT_SECONDS
        value: 90
      - key: TOTAL_JOB_TIMEOUT_SECONDS
        value: 180
      - key: SLIDE_TEXT_CHAR_LIMIT
        value: 5000
